<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meal Planner — The Meal Atelier</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/planner.css">
</head>
<body>

  <aside class="left-box">
    <div class="logo-section">
      <div class="avatar">A</div>
      <h1 class="brand-name">The Meal Atelier</h1>
    </div>
    <nav>
      <div class="menu-group">
        <p class="menu-label">DISCOVERY</p>
        <ul>
          <li onclick="window.location.href='index.html'">Explore Recipes</li>
          <li class="active-menu">Meal Calendar</li>
          <li onclick="window.location.href='grocery.html'">Shopping List</li>
        </ul>
      </div>
    </nav>
    <div class="tip-box">
      <p class="tip-label">PLANNER TIP</p>
      <p class="tip-text">Planning meals ahead reduces food waste and saves up to 30% on grocery bills.</p>
    </div>
  </aside>

  <div class="main-content">

    <div class="top-bar">
      <div class="header-text">
        <h2>Monthly Meal Planner</h2>
      </div>
      <div class="month-nav">
        <button id="prevMonth" aria-label="Previous month">&#8592;</button>
        <span id="monthLabel"></span>
        <button id="nextMonth" aria-label="Next month">&#8594;</button>
      </div>
    </div>

  
    <div class="calendar-dow-header">
      <div>Sun</div><div>Mon</div><div>Tue</div>
      <div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
    </div>

    <main>
      <div class="calendar-grid" id="calendarGrid"></div>
    </main>

  </div>

 
  <div id="mealPickerModal" class="modal" role="dialog" aria-modal="true" aria-label="Pick a meal">
    <div class="modal-content picker-modal-content">
      <button class="close-btn" onclick="closeMealPicker()" aria-label="Close">&times;</button>
      <h2 class="atelier-title" id="pickerTitle">Pick a Meal</h2>
      <p id="pickerSubtitle" class="picker-subtitle"></p>
      <input type="text" id="mealSearch" placeholder="Search recipes..." autocomplete="off">
      <div id="mealPickerList"></div>
    </div>
  </div>

  <script src="js/planner.js"></script>
</body>
</html>
